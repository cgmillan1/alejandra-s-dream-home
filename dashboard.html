  .client-card { background: #fffdf7; border: 1px solid rgba(45,62,47,0.15); border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 4px rgba(45,62,47,0.04); }

  .modal input:focus { outline: none; border-color: #c08552; }
  .modal-link-box { background: #1a3a3a; color: #d4a574; padding: 14px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 12px; word-break: break-all; margin-top: 6px; cursor: pointer; }
  .modal-link-box:hover { background: #2d5050; }
  .modal-btns { display: flex; gap: 8px; margin-top: 18px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; border: 2px solid; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
  .modal-btn.primary { background: #1a3a3a; color: #faf7f0; border-color: #1a3a3a; }
  .modal-btn.secondary { background: transparent; color: #4a5a4a; border-color: rgba(45,62,47,0.3); }
  .copy-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a3a3a; color: #d4a574; padding: 12px 20px; border-radius: 24px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
  .copy-toast.show { opacity: 1; }
</style>

<script>

};

// Change this password to your own — anyone who has it can see all your clients!
const DASHBOARD_PASSWORD = 'cristian2026';

let allClientsData = {};
const el = (id) => document.getElementById(id);

function checkLogin() {
  if (sessionStorage.getItem('cmr_dashboard_auth') === 'yes') showDashboard();
}

el('login-btn').addEventListener('click', tryLogin);
el('login-pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

function tryLogin() {
  if (el('login-pw').value === DASHBOARD_PASSWORD) {
    sessionStorage.setItem('cmr_dashboard_auth', 'yes');
    showDashboard();
  } else {
    el('login-error').textContent = 'Incorrect password';
    el('login-pw').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('cmr_dashboard_auth');
  location.reload();
}

function showDashboard() {
  el('login-screen').classList.add('hidden');
  el('dash').style.display = 'block';
  updateTime();
  setInterval(updateTime, 60000);
  loadClients();
}

function updateTime() {
  const now = new Date();
  el('dash-time').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }) + ' · ' + now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function loadClients() {
  db.ref('clients').on('value', snap => {
    allClientsData = snap.val() || {};
    renderDashboard();
  });
}

function renderDashboard() {
  const codes = Object.keys(allClientsData);
  let totalLoves = 0, totalActions = 0, totalLovedPrice = 0, totalLovedCount = 0;

  codes.forEach(code => {
    const data = allClientsData[code];
    const liked = data.liked || [];
    const disliked = data.disliked || [];
    totalLoves += liked.length;
    totalActions += liked.length + disliked.length;
    liked.forEach(id => {
      if (HOMES_LITE[id]) { totalLovedPrice += HOMES_LITE[id].price; totalLovedCount++; }
    });
  });

  el('stat-clients').textContent = codes.length;
  el('stat-loves').textContent = totalLoves;
  el('stat-actions').textContent = totalActions;
  el('stat-budget').textContent = totalLovedCount ? '$' + Math.round(totalLovedPrice / totalLovedCount / 1000) + 'k' : '$0';

  if (codes.length === 0) {
    el('client-list').innerHTML = '<div class="empty"><i class="ti ti-users"></i><p>No clients yet. Click "New Client Link" to create your first one.</p></div>';
    return;
  }

  codes.sort((a, b) => (allClientsData[b].lastUpdated || 0) - (allClientsData[a].lastUpdated || 0));

  el('client-list').innerHTML = codes.map(code => {
    const data = allClientsData[code];
    const name = data.clientName || CLIENT_NAMES[code] || code;
    const liked = data.liked || [];
    const disliked = data.disliked || [];
    const totalReviewed = liked.length + disliked.length;
    const totalLeft = Math.max(0, 28 - totalReviewed);
    const lastUpdate = data.lastUpdated ? new Date(data.lastUpdated) : null;
    const minutesAgo = lastUpdate ? Math.floor((Date.now() - lastUpdate.getTime()) / 60000) : null;

    let status = 'idle', statusText = 'Idle';
    if (totalLeft === 0 && totalReviewed > 0) { status = 'complete'; statusText = 'Complete'; }
    else if (minutesAgo !== null && minutesAgo < 5) { status = 'active'; statusText = 'Active now'; }
    else if (minutesAgo !== null && minutesAgo < 60) { status = 'active'; statusText = 'Active ' + minutesAgo + 'm ago'; }

    let lastActionText = 'No activity yet';
    if (lastUpdate) {
      if (minutesAgo < 1) lastActionText = 'Just now';
      else if (minutesAgo < 60) lastActionText = minutesAgo + ' minute' + (minutesAgo === 1 ? '' : 's') + ' ago';
      else if (minutesAgo < 1440) { const h = Math.floor(minutesAgo / 60); lastActionText = h + ' hour' + (h === 1 ? '' : 's') + ' ago'; }
      else lastActionText = lastUpdate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    const lovedHtml = liked.length ? liked.map(id => {
      const h = HOMES_LITE[id]; if (!h) return '';
      const score = (data.scores || {})[id] || 0;
      const note = (data.notes || {})[id] || '';
      const rooms = (data.rooms || {})[id] || [];
      return '<div class="home-row loved"><div class="home-info"><div class="home-addr">' + escapeHtml(h.address) + '</div><div class="home-meta">' + escapeHtml(h.city) + ' · $' + h.price.toLocaleString() + ' · ' + h.type + (rooms.length ? ' · Rooms: ' + escapeHtml(rooms.join(', ')) : '') + '</div>' + (note ? '<div class="home-note">' + escapeHtml(note) + '</div>' : '') + '</div>' + (score ? '<div class="home-score">' + score + '/10 ★</div>' : '') + '</div>';
    }).join('') : '<div style="font-size:12px;color:#8a7c6a;font-style:italic">No loves yet</div>';

    const passedHtml = disliked.length ? disliked.map(id => {
      const h = HOMES_LITE[id]; if (!h) return '';
      const note = (data.notes || {})[id] || '';
      return '<div class="home-row passed"><div class="home-info"><div class="home-addr">' + escapeHtml(h.address) + '</div><div class="home-meta">' + escapeHtml(h.city) + ' · $' + h.price.toLocaleString() + ' · ' + h.type + '</div>' + (note ? '<div class="home-note">' + escapeHtml(note) + '</div>' : '') + '</div></div>';
    }).join('') : '<div style="font-size:12px;color:#8a7c6a;font-style:italic">None passed</div>';

    // Show priorities (new ranked system) with fallback to old mustHaves
    const priorities = data.priorities || [];
    const MH_LABELS = {
      'new_only': '🆕 New construction',
      'basement': '⬇️ Has basement',
      'mountain': '🏔️ Mountain views',
      'singlefam': '🏠 Single-family',
      'rate_incentive': '🔥 Rate incentive',
      'low_hoa': '💵 Low HOA',
      'under_450k': '💰 Under $450k',
      'under_500k': '💰 Under $500k',
      'beds_4plus': '🛏️ 4+ bedrooms',
      'baths_3plus': '🚿 3+ bathrooms',
      'sqft_2200': '📐 2,200+ sqft',
      'saratoga': '🏙️ Saratoga Springs only',
      'no_eagle': '🚫 Not Eagle Mountain',
      'garage_2': '🚗 2-car garage',
      'modern': '✨ Recently built'
    };
    let mustHavesHtml;
    if (priorities.length > 0) {
      const weights = [50, 30, 20];
      mustHavesHtml = '<div class="musts-tags">' + priorities.slice(0, 3).map((id, idx) =>
        '<span class="must-tag" style="background:' + (idx === 0 ? '#c08552' : (idx === 1 ? '#d4a574' : '#e8d8c0')) + ';color:' + (idx <= 1 ? '#fff' : '#1a3a3a') + ';font-weight:600">#' + (idx + 1) + ' (' + weights[idx] + '%) ' + escapeHtml(MH_LABELS[id] || id) + '</span>'
      ).join('') + '</div>';
    } else {
      const mustHaves = Object.keys(data.mustHaves || {}).filter(k => data.mustHaves[k]);
      mustHavesHtml = mustHaves.length ? '<div class="musts-tags">' + mustHaves.map(m => '<span class="must-tag">✓ ' + escapeHtml(m) + '</span>').join('') + '</div>' : '<div style="font-size:12px;color:#8a7c6a;font-style:italic">Hasn\'t set priorities yet</div>';
    }

    return '<div class="client-card" data-code="' + code + '" onclick="toggleExpand(\'' + code + '\')">' +
      '<div class="client-row">' +
        '<div class="client-info">' +
          '<div class="client-name">' + escapeHtml(name) + ' <span class="client-status ' + status + '">' + statusText + '</span></div>' +
          '<div class="client-code">code: ' + code + '</div>' +
          '<div class="last-action">Last activity: ' + lastActionText + '</div>' +
        '</div>' +
        '<div class="client-progress">' +
          '<div class="progress-num"><div class="progress-num-val loved">' + liked.length + '</div><div class="progress-num-lbl">Loved</div></div>' +
          '<div class="progress-num"><div class="progress-num-val passed">' + disliked.length + '</div><div class="progress-num-lbl">Passed</div></div>' +
          '<div class="progress-num"><div class="progress-num-val">' + totalLeft + '</div><div class="progress-num-lbl">Left</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="client-detail">' +
        '<div class="detail-section"><div class="detail-title">Top Priorities</div>' + mustHavesHtml + '</div>' +
        '<div class="detail-section"><div class="detail-title"><i class="ti ti-heart"></i> Loved (' + liked.length + ')</div><div class="home-list">' + lovedHtml + '</div></div>' +
        '<div class="detail-section"><div class="detail-title"><i class="ti ti-x"></i> Passed (' + disliked.length + ')</div><div class="home-list">' + passedHtml + '</div></div>' +
        '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">' +
          '<button class="qa-btn" onclick="event.stopPropagation();copyClientLink(\'' + code + '\')"><i class="ti ti-link"></i> Copy Link</button>' +
          '<button class="qa-btn" onclick="event.stopPropagation();openAsClient(\'' + code + '\')"><i class="ti ti-external-link"></i> Open as Client</button>' +
          '<button class="qa-btn" onclick="event.stopPropagation();deleteClient(\'' + code + '\')" style="color:#b85a3d;border-color:#b85a3d"><i class="ti ti-trash"></i> Delete</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleExpand(code) {
  document.querySelectorAll('.client-card').forEach(card => {
    if (card.dataset.code === code) card.classList.toggle('expanded');
    else card.classList.remove('expanded');
  });
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function openNewClient() {
  el('modal-content').innerHTML = '<h3>Create new client link</h3>' +
    '<p>Add a new client by giving them a unique code and name.</p>' +
    '<label>Client name</label>' +
    '<input type="text" id="new-name" placeholder="e.g. Maria Lopez" autofocus>' +
    '<label>Access code (no spaces, all caps)</label>' +
    '<input type="text" id="new-code" placeholder="e.g. MAR2026" maxlength="20" style="text-transform:uppercase">' +
    '<div class="modal-btns">' +
      '<button class="modal-btn secondary" onclick="closeModal()">Cancel</button>' +
      '<button class="modal-btn primary" onclick="createClient()">Create Link</button>' +
    '</div>';
  el('modal-bd').classList.add('active');
  setTimeout(() => el('new-name').focus(), 100);
}

function createClient() {
  const name = el('new-name').value.trim();
  const code = el('new-code').value.toUpperCase().replace(/\s/g, '').trim();
  if (!name || !code) { alert('Please fill both fields'); return; }
  if (CLIENT_NAMES[code] || allClientsData[code]) { alert('That code already exists. Pick a different one.'); return; }

  const link = window.location.origin + window.location.pathname.replace('dashboard.html', '') + '?id=' + code;
  const codeLine = "'" + code + "': '" + name.replace(/'/g, "\\'") + "'";
  el('modal-content').innerHTML = '<h3>' + escapeHtml(name) + "'s link is ready</h3>" +
    '<p>Tap each box below to copy. <strong>Important:</strong> add the client name line to your <code>index.html</code> and <code>dashboard.html</code> CLIENT_NAMES section before sharing the link.</p>' +
    '<label>Client link (tap to copy)</label>' +
    '<div class="modal-link-box" onclick="copyText(\'' + link + '\')">' + link + '</div>' +
    '<label>Add this line to CLIENT_NAMES in both files</label>' +
    '<div class="modal-link-box" onclick="copyText(&quot;' + codeLine.replace(/"/g, '&quot;') + '&quot;)">' + escapeHtml(codeLine) + ',</div>' +
    '<div class="modal-btns">' +
      '<button class="modal-btn primary" onclick="closeModal()">Done</button>' +
    '</div>';
}

function copyClientLink(code) {
  const link = window.location.origin + window.location.pathname.replace('dashboard.html', '') + '?id=' + code;
  copyText(link);
}

function openAsClient(code) {
  const link = window.location.pathname.replace('dashboard.html', '') + '?id=' + code;
  window.open(link, '_blank');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = el('copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  });
}

function deleteClient(code) {
  if (!confirm('Delete all data for ' + code + '? This cannot be undone.')) return;
  db.ref('clients/' + code).remove();
}

function closeModal() { el('modal-bd').classList.remove('active'); }
el('modal-bd').addEventListener('click', (e) => { if (e.target.id === 'modal-bd') closeModal(); });

function exportAllCSV() {
  let csv = 'Client Code,Client Name,Action,Home Address,City,Price,Type,Score,Rooms,Notes\n';
  Object.keys(allClientsData).forEach(code => {
    const data = allClientsData[code];
    const name = data.clientName || CLIENT_NAMES[code] || code;
    (data.liked || []).forEach(id => {
      const h = HOMES_LITE[id]; if (!h) return;
      const score = (data.scores || {})[id] || '';
      const rooms = ((data.rooms || {})[id] || []).join('; ');
      const note = ((data.notes || {})[id] || '').replace(/"/g, '""');
      csv += code + ',"' + name + '",LOVED,"' + h.address + '","' + h.city + '",' + h.price + ',' + h.type + ',' + score + ',"' + rooms + '","' + note + '"\n';
    });
    (data.disliked || []).forEach(id => {
      const h = HOMES_LITE[id]; if (!h) return;
      const note = ((data.notes || {})[id] || '').replace(/"/g, '""');
      csv += code + ',"' + name + '",PASSED,"' + h.address + '","' + h.city + '",' + h.price + ',' + h.type + ',,,"' + note + '"\n';
    });
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'cmr-clients-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

checkLogin();
</script>
